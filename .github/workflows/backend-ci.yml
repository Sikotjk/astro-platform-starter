name: Backend CI

# Läuft nur, wenn sich am Backend (oder diesem Workflow) etwas ändert.
on:
  push:
    branches: ['**']
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: backend

jobs:
  test:
    name: Typecheck · Build · Unit · E2E
    runs-on: ubuntu-latest

    # Echte PostgreSQL als Service-Container für die E2E-Integrationstests.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tj_shipping
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tj_shipping
      JWT_ACCESS_SECRET: ci-test-secret-not-for-production-use
      # Keine Stripe-Keys -> App nutzt automatisch die Fake-Gateways.

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: E2E tests (gegen PostgreSQL)
        run: npm run test:e2e
