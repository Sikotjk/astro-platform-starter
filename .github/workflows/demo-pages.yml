name: App (GitHub Pages)

# Baut die Flutter-Web-App und veröffentlicht sie auf GitHub Pages.
# - Repo-Variable API_BASE_URL gesetzt  -> ECHTE App gegen dieses Backend
# - nicht gesetzt                        -> DEMO (In-Memory, ohne Backend)
#
# Einmalig aktivieren: Repo → Settings → Pages → "Build and deployment" →
# Source: "GitHub Actions". Danach läuft dieser Workflow bei jedem Push am
# Frontend (oder manuell über "Run workflow").

on:
  push:
    branches: ['claude/tadschikistan-p2p-delivery-PSIJM', 'main']
    paths:
      - 'frontend/**'
      - '.github/workflows/demo-pages.yml'
  workflow_dispatch:

# Rechte für das Pages-Deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Immer nur ein Deployment gleichzeitig; laufende abbrechen.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build (Flutter Web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # base-href muss dem Pages-Unterpfad entsprechen (Projekt-Site):
      # https://<user>.github.io/<repo>/
      #
      # Echt-Modus vs. Demo: Ist die Repo-Variable API_BASE_URL gesetzt
      # (Settings → Secrets and variables → Actions → Variables), wird die
      # ECHTE App gegen dieses Backend gebaut. Sonst Fallback auf DEMO_MODE.
      - name: Build web
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          STRIPE_PUBLISHABLE_KEY: ${{ vars.STRIPE_PUBLISHABLE_KEY }}
        run: |
          BASE="/${{ github.event.repository.name }}/"
          if [ -n "$API_BASE_URL" ]; then
            echo "Building REAL app against $API_BASE_URL"
            flutter build web --release --base-href "$BASE" --no-tree-shake-icons \
              --dart-define=API_BASE_URL="$API_BASE_URL" \
              --dart-define=STRIPE_PUBLISHABLE_KEY="$STRIPE_PUBLISHABLE_KEY"
          else
            echo "API_BASE_URL not set -> building DEMO build"
            flutter build web --release --base-href "$BASE" --no-tree-shake-icons \
              --dart-define=DEMO_MODE=true
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
